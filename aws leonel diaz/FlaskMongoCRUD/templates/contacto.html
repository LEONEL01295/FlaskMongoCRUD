{% extends "layout.html" %}
{% block content %}

<div class="container-fluid py-5 text-center text-white" style="background-color: #d6333f;">
  <h2 class="fw-bold mb-3">
    <i class="bi bi-geo-alt-fill"></i> Ubicación & Contacto
  </h2>
  <p>Calle Principal #123, Huetamo, Michoacán</p>
  <p>
    <i class="bi bi-telephone-fill"></i> Teléfono: 435-101-1977 |
    <i class="bi bi-whatsapp text-success"></i> WhatsApp: 435-103-4480
  </p>
  <p><i class="bi bi-clock text-warning"></i> Abierto de Lunes a Domingo, 10:00 am - 10:00 pm</p>

  <hr class="border-light w-50 mx-auto my-4">

  <!-- 📨 FORMULARIO DE CONTACTO FUNCIONAL -->
  <div class="container" style="max-width: 500px;">
    <h5 class="text-white mb-3 fw-semibold"><i class="bi bi-envelope-fill"></i> Envíanos un mensaje</h5>

    <form method="POST" action="{{ url_for('contacto') }}">
      <input type="email" name="correo" class="form-control mb-3 shadow-sm" placeholder="Tu correo" required>
      <input type="text" name="asunto" class="form-control mb-3 shadow-sm" placeholder="Asunto" required>
      <textarea name="mensaje" class="form-control mb-3 shadow-sm" rows="4" placeholder="Escribe tu mensaje" required></textarea>
      <button type="submit" class="btn btn-warning fw-bold w-100 shadow-sm">
        <i class="bi bi-send-fill"></i> Enviar mensaje
      </button>
    </form>
  </div>
</div>


{% endblock %}
