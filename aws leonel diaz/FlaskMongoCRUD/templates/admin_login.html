<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Pollos El Rey</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* 🎥 Video de fondo */
    #video-fondo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* 🧱 Panel */
    .login-box {
      background: rgba(255,255,255,0.90);
      padding: 60px 70px;
      border-radius: 25px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      width: 520px;
      text-align: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .login-box:hover {
      transform: scale(1.02);
    }

    .logo {
      width: 100px;
      margin-bottom: 20px;
    }

    h4 {
      color: #d61e1e;
      font-weight: 700;
      margin-bottom: 35px;
      font-size: 30px;
    }

    .form-control {
      border-radius: 12px;
      padding: 15px;
      font-size: 18px;
      height: 55px;
    }

    .btn {
      border-radius: 12px;
      font-size: 18px;
      padding: 15px;
      height: 55px;
      margin-top: 10px;
      background-color: #1e86d6;
      border: none;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .btn:hover {
      background-color: #ff5c5c;
      transform: scale(1.03);
    }

    .alert {
      font-size: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    @media (max-width: 600px) {
      .login-box {
        width: 90%;
        padding: 40px 25px;
      }
      .logo {
        width: 80px;
      }
      h4 {
        font-size: 24px;
      }
      .form-control, .btn {
        font-size: 16px;
        height: 50px;
      }
    }

    /* 👁️ Mostrar/Ocultar contraseña */
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      border: none;
      background: none;
      color: #888;
      font-size: 22px;
      cursor: pointer;
    }
    .toggle-password:hover {
      color: #e9141b;
    }
  </style>
</head>

<body>
  <video autoplay loop muted playsinline id="video-fondo">
      <source src="{{ url_for('static', filename='videos/fondo.mp4') }}" type="video/mp4">
  </video>

  <div class="login-box">
    <img src="{{ url_for('static', filename='imagenes/gallina.png') }}" class="logo" alt="Logo Gallina">
    <h4>Pollos El Rey</h4>

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="mb-3">
        <input type="text" class="form-control" name="usuario" placeholder="Usuario" required>
      </div>

      <div class="mb-4 password-wrapper">
        <input type="password" id="clave" class="form-control" name="clave" placeholder="Contraseña" required>
        <button type="button" class="toggle-password" id="togglePassword">
          <i class="bi bi-eye-slash" id="icono-ojo"></i>
        </button>
      </div>

      <button type="submit" class="btn btn-danger w-100 fw-semibold">Ingresar / Registrar</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('clave');
    const icono = document.getElementById('icono-ojo');

    togglePassword.addEventListener('click', () => {
      const tipo = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = tipo;

      icono.classList.toggle('bi-eye');
      icono.classList.toggle('bi-eye-slash');
    });
  </script>

</body>
</html>
