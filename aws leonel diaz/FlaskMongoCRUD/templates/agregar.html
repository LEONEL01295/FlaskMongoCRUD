{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">
  <h2 class="text-center text-warning fw-bold mb-4">
    <i class="bi bi-plus-circle"></i> Agregar nuevo producto
  </h2>

  <form method="POST" class="shadow p-4 bg-light rounded mx-auto" style="max-width: 500px;">
    <div class="mb-3">
      <label class="form-label fw-semibold">Nombre:</label>
      <input type="text" name="nombre" class="form-control" placeholder="Ej. Pollo BBQ" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Categoría:</label>
      <input type="text" name="categoria" class="form-control" placeholder="Ej. Pollos" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Precio:</label>
      <input type="number" step="0.01" name="precio" class="form-control" placeholder="Ej. 120.00" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Stock:</label>
      <input type="number" name="stock" class="form-control" placeholder="Ej. 10" required>
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-warning fw-bold text-dark me-2">
        <i class="bi bi-save"></i> Guardar
      </button>
      <a href="{{ url_for('productos') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
    </div>
  </form>
</div>


{% endblock %}
